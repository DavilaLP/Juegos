<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vortex | High Speed Adventure</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
        }
        .stat-box {
            position: absolute;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #score-box { top: 20px; left: 20px; color: #00d2ff; }
        #level-box { top: 20px; right: 20px; color: #bc13fe; }

        /* Menus */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(20,20,40,0.8) 0%, rgba(5,5,5,1) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: auto;
            text-align: center;
        }
        .hidden { display: none !important; }
        
        h2 { 
            font-size: 5rem; 
            margin: 0; 
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 0 0 30px rgba(0, 210, 255, 0.8), 0 0 60px rgba(188, 19, 254, 0.5);
        }

        .instructions {
            margin: 30px 0;
            background: rgba(255,255,255,0.05);
            padding: 20px 40px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #ccc;
            line-height: 1.8;
        }
        .instructions span { color: #00d2ff; font-weight: bold; }

        .btn {
            padding: 18px 50px;
            background: linear-gradient(45deg, #00d2ff, #bc13fe);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 900;
            font-size: 1.5rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.4);
        }
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(188, 19, 254, 0.6);
        }

        #game-over-menu h2 { color: #ff003c; text-shadow: 0 0 30px rgba(255, 0, 60, 0.8); }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: auto;
        }
        .joystick-container {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            position: relative;
            touch-action: none;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .joystick-stick {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        #jump-btn {
            width: 80px;
            height: 80px;
            background: rgba(0, 210, 255, 0.4);
            border: 2px solid #00d2ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            user-select: none;
            touch-action: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div id="score-box" class="stat-box">Score: 0</div>
        <div id="level-box" class="stat-box">Level: 1</div>
    </div>

    <!-- Mobile Controls -->
    <div id="mobile-controls">
        <div id="move-joystick" class="joystick-container">
            <div id="move-stick" class="joystick-stick"></div>
        </div>
        <div id="jump-btn">JUMP</div>
    </div>

    <!-- Start Menu -->
    <div id="start-menu" class="overlay">
        <h2>VORTEX</h2>
        <div class="instructions">
            Mover: <span>W, A, S, D</span> o <span>Flechas</span><br>
            Saltar: <span>Espacio</span><br>
            Objetivo: ¡Cruza el portal al final del nivel!
        </div>
        <button id="start-btn" class="btn">INICIAR</button>
    </div>

    <!-- Game Over Menu -->
    <div id="game-over-menu" class="overlay hidden">
        <h2>GAME OVER</h2>
        <button id="restart-btn" class="btn">REINTENTAR</button>
    </div>
</div>

<script src="js/game.js"></script>
</body>
</html>
