<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Treasure Hunter | Alex Hunter's Adventure</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="hud-top">
                <div class="player-stats">
                    <div class="health-bar-container">
                        <div id="health-bar" class="health-bar-fill"></div>
                    </div>
                    <div class="lives-container" id="lives">
                        <span>❤️</span><span>❤️</span><span>❤️</span>
                    </div>
                </div>
                <div class="inventory">
                    <div class="inv-item">💰 <span id="coins">0</span></div>
                    <div class="inv-item">💎 <span id="gems">0</span></div>
                    <div class="inv-item">🔑 <span id="keys">0</span></div>
                    <div class="inv-item">🗺️ <span id="fragments">0/5</span></div>
                </div>
                <div class="game-info">
                    <div class="info-item">Nivel: <span id="level-val">1</span></div>
                    <div class="info-item">Score: <span id="score-val">0</span></div>
                    <div class="info-item">Tiempo: <span id="time-val">00:00</span></div>
                </div>
            </div>
        </div>

        <!-- MENÚ PRINCIPAL -->
        <div id="main-menu" class="overlay">
            <div class="menu-content">
                <div class="logo-container">
                    <img src="thease logo.png" alt="Treasure Hunter Logo" class="main-logo">
                    <div class="subtitle">The Lost Island</div>
                </div>
                <div class="menu-btns">
                    <button id="play-btn" class="btn-cartoon">¡JUGAR!</button>
                    <button id="options-btn" class="btn-cartoon">CONFIGURACIÓN</button>
                    <button id="credits-btn" class="btn-cartoon">CRÉDITOS</button>
                    <button id="exit-btn" class="btn-cartoon">SALIR</button>
                </div>
            </div>
        </div>

        <!-- PAUSA -->
        <div id="pause-menu" class="overlay hidden">
            <div class="menu-content">
                <h1 class="game-title">PAUSA</h1>
                <div class="menu-btns">
                    <button id="resume-btn" class="btn-cartoon">CONTINUAR</button>
                    <button id="main-menu-btn" class="btn-cartoon">MENÚ PRINCIPAL</button>
                </div>
            </div>
        </div>

        <!-- GAME OVER / VICTORIA -->
        <div id="end-menu" class="overlay hidden">
            <div class="menu-content">
                <h1 id="end-title" class="game-title">GAME OVER</h1>
                <p id="end-stats">Puntaje Final: 0</p>
                <button id="restart-btn" class="btn-cartoon">REINTENTAR</button>
            </div>
        </div>

        <!-- CONTROLES MÓVIL -->
        <div id="mobile-controls" class="hidden">
            <div class="d-pad">
                <button id="ctrl-up" class="ctrl-btn">↑</button>
                <div class="horizontal-ctrls">
                    <button id="ctrl-left" class="ctrl-btn">←</button>
                    <button id="ctrl-right" class="ctrl-btn">→</button>
                </div>
                <button id="ctrl-down" class="ctrl-btn">↓</button>
            </div>
            <div class="action-btns">
                <button id="ctrl-jump" class="action-btn jump">SALTAR</button>
                <button id="ctrl-attack" class="action-btn attack">ATACAR</button>
                <button id="ctrl-interact" class="action-btn interact">E</button>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
